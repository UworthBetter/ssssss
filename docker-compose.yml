version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: qkyd-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    volumes:
      - ./logs:/app/logs
      - ./upload:/app/upload
      - ./config:/app/config
    networks:
      - qkyd-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: qkyd-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - qkyd-network

networks:
  qkyd-network:
    driver: bridge

volumes:
  logs:
  upload:
  config:
