version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: qkyd-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: qkyd_jkpt
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - /tmp/mysql:/docker-entrypoint-initdb.d
    networks:
      - qkyd-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    image: eclipse-temurin:17-jre-jammy
    container_name: qkyd-backend
    restart: always
    command: sh -c "java $JAVA_OPTS -jar /app/app.jar --spring.config.location=classpath:/,file:/app/"
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    volumes:
      - /root/qkyd/logs:/app/logs
      - /root/qkyd/upload:/app/upload
      - /root/qkyd/config:/app/config
      - /root/qkyd/application-prod.yml:/app/application.yml
      - /root/qkyd/backend/app.jar:/app/app.jar
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - qkyd-network
    healthcheck:
      test: ["CMD-SHELL", "java -version || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

networks:
  qkyd-network:
    driver: bridge

volumes:
  mysql_data:
