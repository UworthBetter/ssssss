# 椤圭洰鐩稿叧閰嶇疆
qkyd:
  # 鍚嶇О
  name: 耆康云盾健康监测平台
  # 鐗堟湰
  version: 3.8.7
  # 鐗堟潈骞翠唤
  copyrightYear: 2023
  # 鏂囦欢璺緞 绀轰緥锛?Windows閰嶇疆D:/qkyd/uploadPath锛孡inux閰嶇疆 /home/qkyd/uploadPath锛?
  profile: D:/qkyd/uploadPath
  # 鑾峰彇ip鍦板潃寮€鍏?
  addressEnabled: false
  # 楠岃瘉鐮佺被鍨?math 鏁板瓧璁＄畻 char 瀛楃楠岃瘉
  captchaType: math
  demo:
    engine:
      enabled: true
      interval-ms: 10000
      initial-delay-ms: 5000
      subject-count: 6

# 寮€鍙戠幆澧冮厤缃?
server:
  # 鏈嶅姟鍣ㄧ殑HTTP绔彛锛岄粯璁や负8080
  port: 8098
  servlet:
    # 搴旂敤鐨勮闂矾寰?
    context-path: /
  tomcat:
    # tomcat鐨刄RI缂栫爜
    uri-encoding: UTF-8
    # 杩炴帴鏁版弧鍚庣殑鎺掗槦鏁帮紝榛樿涓?00
    accept-count: 1000
    threads:
      # tomcat鏈€澶х嚎绋嬫暟锛岄粯璁や负200
      max: 800
      # Tomcat鍚姩鍒濆鍖栫殑绾跨▼鏁帮紝榛樿鍊?0
      min-spare: 100

# 鏃ュ織閰嶇疆
logging:
  level:
    com.qkyd: debug
    org.springframework: warn

# 鐢ㄦ埛閰嶇疆
user:
  password:
    # 瀵嗙爜鏈€澶ч敊璇鏁?
    maxRetryCount: 5
    # 瀵嗙爜閿佸畾鏃堕棿锛堥粯璁?0鍒嗛挓锛?
    lockTime: 10

# Spring閰嶇疆
spring:
  # 璧勬簮淇℃伅
  messages:
    # 鍥介檯鍖栬祫婧愭枃浠惰矾寰?
    basename: i18n/messages
  profiles:
    active: druid
  # 鏂囦欢涓婁紶
  servlet:
    multipart:
      # 鍗曚釜鏂囦欢澶у皬
      max-file-size: 10MB
      # 璁剧疆鎬讳笂浼犵殑鏂囦欢澶у皬
      max-request-size: 20MB
  # 鏈嶅姟妯″潡
  input:
    file:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  devtools:
    restart:
      # 鐑儴缃插紑鍏?
      enabled: true
  # Spring AI閰嶇疆
  ai:
    openai:
      # API Key (璇锋浛鎹负瀹為檯鐨凙PI Key锛屾敮鎸丱penAI銆丄zure OpenAI鎴栧吋瀹圭殑API)
      api-key: ${AI_API_KEY:}
      # 鍩虹URL锛屽綋鍓嶉粯璁や负鏅鸿氨 AI OpenAI-compatible gateway
      base-url: ${AI_BASE_URL:https://api.openai.com}
      chat:
        options:
          # 妯″瀷鍚嶇О
          model: ${AI_MODEL:GLM-4.7}
          # 娓╁害鍙傛暟 (0-2)
          temperature: ${AI_TEMPERATURE:0.7}

# token閰嶇疆
token:
  # 浠ょ墝鑷畾涔夋爣璇?
  header: Authorization
  # 浠ょ墝瀵嗛挜
  secret: abcdefghijklmnopqrstuvwxyz1234567890ABCDEF
  # 浠ょ墝鏈夋晥鏈燂紙榛樿30鍒嗛挓锛?
  expireTime: 30

# MyBatis閰嶇疆
mybatis:
  # 鎼滅储鎸囧畾鍖呭埆鍚?
  typeAliasesPackage: com.qkyd.**.domain
  # 閰嶇疆mapper鐨勬壂鎻忥紝鎵惧埌鎵€鏈夌殑mapper.xml鏄犲皠鏂囦欢
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 鍔犺浇鍏ㄥ眬鐨勯厤缃枃浠?
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper鍒嗛〉鎻掍欢
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger閰嶇疆
swagger:
  # 鏄惁寮€鍚痵wagger
  enabled: true
  # 璇锋眰鍓嶇紑
  pathMapping: /dev-api

# 闃叉XSS鏀诲嚮
xss:
  # 杩囨护寮€鍏?
  enabled: true
  # 鎺掗櫎閾炬帴锛堝涓敤閫楀彿鍒嗛殧锛?
  excludes: /system/notice
  # 鍖归厤閾炬帴
  urlPatterns: /system/*,/monitor/*,/tool/*

# AI 绠楁硶鏈嶅姟閰嶇疆
ueit:
  ai:
    # Python绠楁硶鏈嶅姟鍦板潃
    service-url: ${AI_SERVICE_URL:http://localhost:8011}
    # 杩炴帴瓒呮椂鏃堕棿 (姣)
    connect-timeout: 5000
    # 璇诲彇瓒呮椂鏃堕棿 (姣)
    read-timeout: 30000
    # 鏄惁鍚敤寮傛澶勭悊
    async-enabled: true



